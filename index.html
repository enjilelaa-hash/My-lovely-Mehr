<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>برای مهرنوش 💓🎀</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #fff;
  text-align: center;
  overflow: hidden;
}

.container {
  margin-top: 80px;
}

button {
  padding: 12px 25px;
  margin: 10px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

#yes {
  background: #ff4d6d;
  color: white;
}

#no {
  background: #ccc;
}

/* 💓 قلب */
.heart {
  position: fixed;
  color: red;
  font-size: 20px;
  animation: float 2s linear forwards;
}

@keyframes float {
  from {transform: translateY(0); opacity: 1;}
  to {transform: translateY(-200px); opacity: 0;}
}

/* 🕯️ شمع */
.candle {
  width: 20px;
  height: 60px;
  background: #eee;
  margin: 20px auto;
  position: relative;
}

.flame {
  width: 15px;
  height: 15px;
  background: orange;
  border-radius: 50%;
  position: absolute;
  top: -15px;
  left: 2px;
  animation: flicker 0.2s infinite alternate;
}

@keyframes flicker {
  from {transform: scale(1);}
  to {transform: scale(1.2);}
}

/* 🖼️ عکس */
#photo {
  width: 200px;
  border-radius: 15px;
  margin-top: 20px;
  display: none;
}
</style>
</head>

<body>

<div class="candle">
  <div class="flame"></div>
</div>

<div class="container" id="capture">
  <h2>برای یه ماجراجویی خاص حاضری؟</h2>
  <button id="yes">YES ❤️</button>
  <button id="no">NO 🙃</button>

  <!-- 📸 عکس -->
  <img id="photo" src="photo.jpg">
</div>

<button onclick="downloadPage()">📄 دانلود نتیجه</button>

<audio id="music" src="music.mp3" loop></audio>

<!-- کتابخونه اسکرین‌شات -->
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>
const music = document.getElementById("music");
const yesBtn = document.getElementById("yes");
const noBtn = document.getElementById("no");
const photo = document.getElementById("photo");

// 🎵 Fade in موزیک
function fadeInAudio(audio) {
  audio.volume = 0;
  audio.play().catch(()=>{});
  let vol = 0;
  let interval = setInterval(() => {
    if (vol < 1) {
      vol += 0.05;
      audio.volume = vol;
    } else {
      clearInterval(interval);
    }
  }, 200);
}

// ✅ YES
yesBtn.addEventListener("click", () => {
  fadeInAudio(music);
  photo.style.display = "block";

  // 💓 قلب
  for (let i = 0; i < 15; i++) {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerText = "💓";
    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.top = Math.random() * window.innerHeight + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 2000);
  }
});

// ❌ NO فرار
noBtn.addEventListener("mouseover", () => {
  const x = Math.random() * window.innerWidth * 0.8;
  const y = Math.random() * window.innerHeight * 0.8;
  noBtn.style.position = "absolute";
  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
});

// 📄 دانلود
function downloadPage() {
  html2canvas(document.getElementById("capture")).then(canvas => {
    let link = document.createElement("a");
    link.download = "love.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}
</script>

</body>
</html>
